<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kong Voice Agent 前端联调台</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #62717c;
      --line: #d9e2e7;
      --surface: #f7faf9;
      --panel: #ffffff;
      --teal: #0f766e;
      --teal-dark: #115e59;
      --amber: #b45309;
      --rose: #be123c;
      --blue: #2563eb;
      --shadow: 0 18px 50px rgba(23, 32, 38, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #eef7f4 0%, #f7faf9 46%, #fffaf0 100%);
      color: var(--ink);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--teal);
      cursor: pointer;
      min-height: 42px;
    }

    button:hover:not(:disabled) {
      background: var(--teal-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .button-secondary {
      color: var(--ink);
      background: #e7eef1;
    }

    .button-secondary:hover:not(:disabled) {
      background: #d6e1e6;
    }

    .button-warning {
      background: var(--amber);
    }

    .button-warning:hover:not(:disabled) {
      background: #92400e;
    }

    .button-danger {
      background: var(--rose);
    }

    .button-danger:hover:not(:disabled) {
      background: #9f1239;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 18px 0 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 10px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.7;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 156px;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--muted);
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .status-pill.connected .status-dot {
      background: #16a34a;
    }

    .status-pill.recording .status-dot {
      background: var(--rose);
    }

    main {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    section {
      min-width: 0;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel + .panel {
      margin-top: 18px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 250, 249, 0.78);
    }

    h2 {
      margin: 0;
      font-size: 17px;
    }

    .panel-body {
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.6;
    }

    .field + .field {
      margin-top: 14px;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .button-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdfc;
      min-height: 72px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .conversation {
      display: grid;
      gap: 12px;
      max-height: 390px;
      overflow: auto;
      padding-right: 4px;
    }

    .bubble {
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.65;
      border: 1px solid var(--line);
      background: #fff;
      overflow-wrap: anywhere;
    }

    .bubble.user {
      border-color: rgba(37, 99, 235, 0.28);
      background: #eff6ff;
    }

    .bubble.agent {
      border-color: rgba(15, 118, 110, 0.28);
      background: #ecfdf5;
    }

    .bubble.system {
      color: var(--muted);
      background: #f8fafc;
    }

    .log {
      height: 560px;
      overflow: auto;
      background: #101820;
      color: #d6f5e8;
      padding: 14px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .event-line {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(214, 245, 232, 0.12);
    }

    .event-type {
      color: #fbbf24;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 10px 0 0;
    }

    @media (max-width: 860px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .status-pill {
        justify-self: start;
      }

      .button-row,
      .button-row.three,
      .meta-grid {
        grid-template-columns: 1fr;
      }

      .log {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Kong Voice Agent 前端联调台</h1>
        <p class="subtitle">连接 WebSocket，发送文本或麦克风 PCM，观察 session、turnId、ASR、LLM、TTS 和 interruption 事件。</p>
      </div>
      <div id="statusPill" class="status-pill">
        <span class="status-dot"></span>
        <span id="statusText">未连接</span>
      </div>
    </header>

    <main>
      <section>
        <div class="panel">
          <div class="panel-title">
            <h2>连接</h2>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="wsUrl">WebSocket 地址</label>
              <input id="wsUrl" value="ws://localhost:9877/ws/agent" autocomplete="off">
            </div>
            <div class="button-row">
              <button id="connectBtn">连接</button>
              <button id="disconnectBtn" class="button-secondary" disabled>断开</button>
            </div>
            <div class="button-row three">
              <button id="pingBtn" class="button-secondary" disabled>Ping</button>
              <button id="interruptBtn" class="button-warning" disabled>打断</button>
              <button id="clearBtn" class="button-secondary">清空</button>
            </div>
            <p class="hint">麦克风采集会转换为 16kHz 单声道 PCM16，并以二进制帧发送。</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>文本输入</h2>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="textInput">用户文本</label>
              <textarea id="textInput">你好，介绍一下你自己</textarea>
            </div>
            <button id="sendTextBtn" disabled>发送文本</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>麦克风</h2>
          </div>
          <div class="panel-body">
            <div class="button-row">
              <button id="recordBtn" disabled>开始录音</button>
              <button id="audioEndBtn" class="button-danger" disabled>结束音频</button>
            </div>
            <p class="hint" id="audioHint">未开始采集。</p>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>会话信息</h2>
          </div>
          <div class="panel-body">
            <div class="meta-grid">
              <div class="metric">
                <span>sessionId</span>
                <strong id="sessionId">-</strong>
              </div>
              <div class="metric">
                <span>turnId</span>
                <strong id="turnId">-</strong>
              </div>
              <div class="metric">
                <span>服务端状态</span>
                <strong id="serverState">-</strong>
              </div>
              <div class="metric">
                <span>事件数</span>
                <strong id="eventCount">0</strong>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="panel">
          <div class="panel-title">
            <h2>对话</h2>
          </div>
          <div class="panel-body">
            <div id="conversation" class="conversation">
              <div class="bubble system">等待连接。</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <h2>事件日志</h2>
          </div>
          <div id="eventLog" class="log"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const els = {
      wsUrl: document.querySelector("#wsUrl"),
      statusPill: document.querySelector("#statusPill"),
      statusText: document.querySelector("#statusText"),
      connectBtn: document.querySelector("#connectBtn"),
      disconnectBtn: document.querySelector("#disconnectBtn"),
      pingBtn: document.querySelector("#pingBtn"),
      interruptBtn: document.querySelector("#interruptBtn"),
      clearBtn: document.querySelector("#clearBtn"),
      textInput: document.querySelector("#textInput"),
      sendTextBtn: document.querySelector("#sendTextBtn"),
      recordBtn: document.querySelector("#recordBtn"),
      audioEndBtn: document.querySelector("#audioEndBtn"),
      audioHint: document.querySelector("#audioHint"),
      sessionId: document.querySelector("#sessionId"),
      turnId: document.querySelector("#turnId"),
      serverState: document.querySelector("#serverState"),
      eventCount: document.querySelector("#eventCount"),
      conversation: document.querySelector("#conversation"),
      eventLog: document.querySelector("#eventLog")
    };

    let socket = null;
    let eventCount = 0;
    let currentTurnId = null;
    let currentAgentBubble = null;
    let currentPartialBubble = null;
    let mediaStream = null;
    let audioContext = null;
    let processor = null;
    let sourceNode = null;
    let recording = false;

    function setConnected(connected) {
      els.statusPill.classList.toggle("connected", connected);
      els.statusText.textContent = connected ? "已连接" : "未连接";
      els.connectBtn.disabled = connected;
      els.disconnectBtn.disabled = !connected;
      els.pingBtn.disabled = !connected;
      els.interruptBtn.disabled = !connected;
      els.sendTextBtn.disabled = !connected;
      els.recordBtn.disabled = !connected;
      els.audioEndBtn.disabled = !connected;
    }

    function setRecording(value) {
      recording = value;
      els.statusPill.classList.toggle("recording", value);
      els.recordBtn.textContent = value ? "停止录音" : "开始录音";
      els.audioHint.textContent = value ? "正在发送 PCM 二进制帧。" : "未开始采集。";
    }

    function sendJson(type, payload = {}) {
      if (!socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type, payload }));
      addLog({ direction: "up", type, payload });
    }

    function connect() {
      socket = new WebSocket(els.wsUrl.value.trim());
      socket.binaryType = "arraybuffer";
      els.statusText.textContent = "连接中";

      socket.addEventListener("open", () => {
        setConnected(true);
        addSystemBubble("WebSocket 已连接。");
      });

      socket.addEventListener("message", (event) => {
        if (typeof event.data !== "string") {
          addLog({ direction: "down", type: "binary", bytes: event.data.byteLength || 0 });
          return;
        }
        const message = JSON.parse(event.data);
        handleEvent(message);
      });

      socket.addEventListener("close", () => {
        setConnected(false);
        stopRecording();
        addSystemBubble("WebSocket 已断开。");
      });

      socket.addEventListener("error", () => {
        addSystemBubble("WebSocket 连接错误，请确认后端已启动。");
      });
    }

    function disconnect() {
      if (socket) socket.close();
    }

    function handleEvent(message) {
      eventCount += 1;
      els.eventCount.textContent = String(eventCount);
      if (message.sessionId) els.sessionId.textContent = message.sessionId;
      if (Number.isFinite(message.turnId)) {
        els.turnId.textContent = String(message.turnId);
        if (currentTurnId !== message.turnId) {
          currentTurnId = message.turnId;
          currentAgentBubble = null;
          currentPartialBubble = null;
        }
      }
      if (message.type === "state_changed") {
        els.serverState.textContent = message.payload?.state || "-";
      }
      renderMessage(message);
      addLog({ direction: "down", ...message });
    }

    function renderMessage(message) {
      const payload = message.payload || {};
      if (message.type === "asr_partial") {
        if (!currentPartialBubble) currentPartialBubble = addBubble("system", "");
        currentPartialBubble.textContent = `临时转写：${payload.text || ""}`;
      } else if (message.type === "asr_final") {
        currentPartialBubble = null;
        addBubble("user", payload.text || "");
      } else if (message.type === "agent_thinking") {
        currentAgentBubble = addBubble("agent", "思考中...");
      } else if (message.type === "agent_text_chunk") {
        if (!currentAgentBubble) currentAgentBubble = addBubble("agent", "");
        if (currentAgentBubble.textContent === "思考中...") currentAgentBubble.textContent = "";
        currentAgentBubble.textContent += payload.text || "";
      } else if (message.type === "playback_stop" || message.type === "turn_interrupted") {
        addSystemBubble(`turn ${message.turnId} 已停止：${payload.reason || message.type}`);
      } else if (message.type === "error") {
        addSystemBubble(`错误：${payload.code || "error"} ${payload.message || ""}`);
      }
    }

    function addBubble(kind, text) {
      const node = document.createElement("div");
      node.className = `bubble ${kind}`;
      node.textContent = text;
      els.conversation.appendChild(node);
      els.conversation.scrollTop = els.conversation.scrollHeight;
      return node;
    }

    function addSystemBubble(text) {
      addBubble("system", text);
    }

    function addLog(event) {
      const line = document.createElement("div");
      line.className = "event-line";
      const type = event.type || "event";
      line.innerHTML = `<span class="event-type">${escapeHtml(type)}</span>\n${escapeHtml(JSON.stringify(event, null, 2))}`;
      els.eventLog.prepend(line);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function toggleRecording() {
      if (recording) {
        stopRecording();
        return;
      }
      if (!socket || socket.readyState !== WebSocket.OPEN) return;

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      audioContext = new AudioContext();
      sourceNode = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);

      processor.onaudioprocess = (event) => {
        if (!recording || !socket || socket.readyState !== WebSocket.OPEN) return;
        const input = event.inputBuffer.getChannelData(0);
        const pcm = floatTo16kPcm(input, audioContext.sampleRate);
        if (pcm.byteLength > 0) socket.send(pcm);
      };

      sourceNode.connect(processor);
      processor.connect(audioContext.destination);
      setRecording(true);
    }

    function stopRecording() {
      setRecording(false);
      if (processor) processor.disconnect();
      if (sourceNode) sourceNode.disconnect();
      if (mediaStream) mediaStream.getTracks().forEach((track) => track.stop());
      if (audioContext) audioContext.close();
      processor = null;
      sourceNode = null;
      mediaStream = null;
      audioContext = null;
    }

    function floatTo16kPcm(input, inputRate) {
      const targetRate = 16000;
      const ratio = inputRate / targetRate;
      const outputLength = Math.floor(input.length / ratio);
      const buffer = new ArrayBuffer(outputLength * 2);
      const view = new DataView(buffer);

      // 线性抽样足够支撑联调；正式产品可替换为更高质量的重采样实现。
      for (let i = 0; i < outputLength; i += 1) {
        const sourceIndex = Math.floor(i * ratio);
        const sample = Math.max(-1, Math.min(1, input[sourceIndex] || 0));
        const pcm = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
        view.setInt16(i * 2, pcm, true);
      }
      return buffer;
    }

    els.connectBtn.addEventListener("click", connect);
    els.disconnectBtn.addEventListener("click", disconnect);
    els.pingBtn.addEventListener("click", () => sendJson("ping", { ts: Date.now() }));
    els.interruptBtn.addEventListener("click", () => sendJson("interrupt", { reason: "client_interrupt" }));
    els.clearBtn.addEventListener("click", () => {
      els.eventLog.textContent = "";
      els.conversation.innerHTML = "";
      addSystemBubble("已清空。");
    });
    els.sendTextBtn.addEventListener("click", () => {
      const text = els.textInput.value.trim();
      if (text) sendJson("text", { text });
    });
    els.recordBtn.addEventListener("click", () => {
      toggleRecording().catch((error) => addSystemBubble(`麦克风失败：${error.message}`));
    });
    els.audioEndBtn.addEventListener("click", () => {
      stopRecording();
      sendJson("audio_end", {});
    });

    setConnected(false);
  </script>
</body>
</html>
