server:
  port: 9877

spring:
  application:
    name: kong-voice-agent

logging:
  level:
    root: INFO
    io.github.kongweiguang.voice.agent: DEBUG

voice-agent:
  audio:
    sample-rate: 16000
    channels: 1
    sample-format: s16le
    upload-chunk-ms: 20
  vad:
    model-path: ${VOICE_AGENT_VAD_MODEL_PATH:file:models/silero_vad.onnx}
    speech-threshold: 0.6
    fallback-enabled: true
